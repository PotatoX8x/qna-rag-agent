<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QnA RAG Agent — Sign in</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">QnA RAG Agent</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" data-form="login-form">Sign in</button>
        <button class="auth-tab"        data-form="register-form">Register</button>
      </div>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email"
                 autocomplete="email" placeholder="you@example.com" />
          <span class="field-error" id="login-email-error"></span>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password"
                 autocomplete="current-password" />
          <span class="field-error" id="login-password-error"></span>
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <form id="register-form" class="auth-form hidden" novalidate>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" name="email" type="email"
                 autocomplete="email" placeholder="you@example.com" />
          <span class="field-error" id="reg-email-error"></span>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" name="password" type="password"
                 autocomplete="new-password" />
          <span class="field-error" id="reg-password-error"></span>
        </div>
        <div class="form-group">
          <label for="reg-password-confirm">Repeat password</label>
          <input id="reg-password-confirm" name="password_confirm" type="password"
                 autocomplete="new-password" />
          <span class="field-error" id="reg-password-confirm-error"></span>
        </div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>

      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <script type="module" src="/assets/js/auth.js"></script>
</body>
</html>
