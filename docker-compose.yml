services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: qna
      POSTGRES_USER: qna
      POSTGRES_PASSWORD: qna
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qna -d qna"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://qna:qna@postgres:5432/qna
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: uvicorn app.api.app:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://qna:qna@postgres:5432/qna
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URL: http://mlflow:5000
      ALLOWED_ORIGINS: http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: >
      watchmedo auto-restart --directory=/app/app --pattern=*.py --recursive --
      celery -A app.worker.celery_app worker --loglevel=info -Q ingestion -c 2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://qna:qna@postgres:5432/qna
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - app_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_data:
  app_data:
